<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Luminous Ledger - Edit Transaction</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e5e2e1;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-indigo {
            box-shadow: 0 0 20px 0 rgba(99, 102, 241, 0.2);
        }
        .glass-panel {
            background: #171717;
            border: 1px solid #262626;
        }
    </style>

                        "surface": "#131313",

                        "surface-variant": "#353534",
                        "on-secondary": "#003824",
                        "inverse-primary": "#494bd6",
                        "error-container": "#93000a",
                        "tertiary-fixed": "#ffdadb",
                        "tertiary": "#ffb2b7",
                        "on-primary-fixed": "#07006c",
                        "on-tertiary": "#67001b",
                        "surface-dim": "#131313",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-secondary-fixed": "#002113",
                        "surface-container": "#201f1f",
                        "on-secondary-container": "#00311f",
                        "error": "#ffb4ab",
                        "on-background": "#e5e2e1",
                        "on-surface": "#e5e2e1",
                        "outline-variant": "#464554",
                        "inverse-on-surface": "#313030",
                        "background": "#131313",
                        "secondary-container": "#00a572",
                        "on-error": "#690005",
                        "on-tertiary-container": "#5b0017",

                        "on-primary-fixed-variant": "#2f2ebe",

                    "borderRadius": {

                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "8px",
                        "margin-desktop": "32px",
                        "sm": "12px",
                        "xl": "32px",
                        "gutter": "16px",
                        "lg": "24px",
                        "xxl": "48px",

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-surface flex justify-between items-center w-full px-4 h-14 border-b border-outline-variant">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low transition-all active:scale-95">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="text-headline-sm font-headline-sm text-on-surface">Edit Transaction</h1>
</div>
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low text-tertiary-container transition-all active:scale-95" title="Delete Transaction">
<span class="material-symbols-outlined">delete</span>
</button>
</header>
<main class="max-w-2xl mx-auto px-4 py-8 pb-32">
<!-- Transaction ID Badge -->
<div class="flex justify-center mb-8">
<span class="px-3 py-1 bg-surface-variant text-label-md font-label-md rounded-full text-on-surface-variant border border-outline-variant">
                Transaction ID: #TXN-001
            </span>
</div>
<!-- Form Section -->
<div class="space-y-6">
<!-- Amount Input -->
<div class="space-y-2">
<label class="text-label-lg font-label-lg text-outline">Amount</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-headline-md font-headline-md text-primary">₹</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-5 pl-12 pr-4 text-headline-md font-headline-md text-on-surface focus:ring-2 focus:ring-primary-container transition-all" type="text" value="1,500"/>
</div>
</div>
<!-- Transaction Type (Gave/Got) -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-4 rounded-xl border border-outline-variant bg-surface-container hover:bg-surface-container-high transition-all">
<span class="material-symbols-outlined text-tertiary-container">arrow_upward</span>
<span class="text-label-lg font-label-lg">You Gave</span>
</button>
<button class="flex items-center justify-center gap-2 py-4 rounded-xl border-2 border-secondary-container bg-secondary-container/10 transition-all">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-label-lg font-label-lg text-secondary">You Got</span>
</button>
</div>
<!-- Transaction Details Card -->
<div class="glass-panel rounded-2xl p-6 space-y-6">
<!-- Category/Note -->
<div class="space-y-2">
<label class="text-label-lg font-label-lg text-outline">Category / Description</label>
<div class="flex items-center gap-3 bg-surface-container-lowest p-4 rounded-xl border border-outline-variant">
<span class="material-symbols-outlined text-on-surface-variant">payments</span>
<input class="bg-transparent border-none flex-grow text-body-lg font-body-lg text-on-surface focus:ring-0 p-0" type="text" value="Payment Received"/>
</div>
</div>
<!-- Date & Time -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-label-lg font-label-lg text-outline">Date</label>
<div class="flex items-center gap-3 bg-surface-container-lowest p-4 rounded-xl border border-outline-variant">
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
<input class="bg-transparent border-none flex-grow text-body-lg font-body-lg text-on-surface focus:ring-0 p-0" type="text" value="Oct 24, 2023"/>
</div>
</div>
<div class="space-y-2">
<label class="text-label-lg font-label-lg text-outline">Time</label>
<div class="flex items-center gap-3 bg-surface-container-lowest p-4 rounded-xl border border-outline-variant">
<span class="material-symbols-outlined text-on-surface-variant">schedule</span>
<input class="bg-transparent border-none flex-grow text-body-lg font-body-lg text-on-surface focus:ring-0 p-0" type="text" value="04:20 PM"/>
</div>
</div>
</div>
<!-- Attachment (Optional pre-filled example) -->
<div class="space-y-2">
<label class="text-label-lg font-label-lg text-outline">Attachments</label>
<div class="flex gap-4">
<div class="relative w-20 h-20 rounded-lg overflow-hidden border border-outline-variant">
<img class="w-full h-full object-cover" data-alt="A high-resolution photograph of a crisp, physical receipt placed on a dark, reflective surface. The image is captured with professional shallow depth of field, emphasizing the texture of the paper against the minimalist charcoal background. The lighting is soft and directional, aligning with the sophisticated Luminous Ledger dark theme, featuring subtle deep indigo highlights." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAubtTcRLEgp9l2Y85yrMEXDVS5oJSknO0p-KRtVsZjZ0Y6U-acUSHQs522yT9uwi9q01E9Fxo-MWFZswiMlr5j7FQ1iV8MKWQkmDgHPbVAujYxpBfxyHmwQwH5LHvOH3WrHlwNFQHt_EXiaZGthz8YgTldbk307MJZRNF9aIBfWe5jP_mOHKbtzH8ZIvobusLAQ9iwnVaQotgGlbNj9-uXeBVLlaIPcFU_PaEcdxtMR24U3AQbpCt-jNix35MMhpIREki0iVem3YSJ"/>
<button class="absolute top-1 right-1 bg-black/60 rounded-full p-0.5">
<span class="material-symbols-outlined text-sm text-error">close</span>
</button>
</div>
<button class="w-20 h-20 rounded-lg border-2 border-dashed border-outline-variant flex flex-col items-center justify-center hover:bg-surface-container-low transition-all">
<span class="material-symbols-outlined text-primary">add_a_photo</span>
<span class="text-[10px] text-outline mt-1 uppercase font-bold">Add</span>
</button>
</div>
</div>
</div>
<!-- Notes Section -->
<div class="space-y-2">
<label class="text-label-lg font-label-lg text-outline">Additional Notes (Private)</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant rounded-xl p-4 text-body-md font-body-md text-on-surface focus:ring-2 focus:ring-primary-container resize-none" placeholder="Add details about this transaction..." rows="3">This was for the monthly consulting services provided to the client. Net 30 terms applied.</textarea>
</div>
</div>
</main>
<!-- Fixed Bottom Actions -->
<footer class="fixed bottom-0 left-0 w-full p-4 bg-surface/80 backdrop-blur-lg border-t border-outline-variant z-50">
<div class="max-w-2xl mx-auto flex gap-4">
<button class="flex-1 py-4 px-6 rounded-xl border border-outline-variant text-label-lg font-label-lg text-on-surface hover:bg-surface-container-low transition-all active:scale-95">
                Cancel
            </button>
<button class="flex-[2] py-4 px-6 rounded-xl bg-primary text-on-primary text-label-lg font-label-lg font-bold glow-indigo hover:opacity-90 transition-all active:scale-95">
                Update Transaction
            </button>
</div>
</footer>
<!-- Bottom Nav Shell (Suppressed based on Task Focus - Sub-page with "Back" action) -->
<!-- As per instructions: "Automatic Suppression: You MUST exclude the navigation shell if the page intent is... Any sub-page featuring a 'Close' or 'Back' action" -->
</body></html>
