        body {
            background-color: #0a0a0a;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;

<body class="min-h-screen pb-24 md:pb-8 flex flex-col items-center">
<!-- Top Navigation Bar -->
<header class="w-full max-w-2xl bg-surface flex justify-between items-center px-margin-mobile md:px-margin-desktop h-14 border-b border-outline-variant z-50 sticky top-0">
<div class="flex items-center gap-md">
<button class="flex items-center justify-center p-base hover:bg-surface-container-low transition-colors duration-200">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="text-headline-sm font-headline-sm text-on-surface">Add Transaction</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface-variant">more_vert</span>
</div>
</header>
<main class="w-full max-w-2xl px-margin-mobile md:px-margin-desktop pt-lg flex flex-col gap-lg">
<!-- Transaction Type Segmented Control -->
<div class="tonal-layer-1 p-xs rounded-xl flex">
<button class="flex-1 py-md rounded-lg flex items-center justify-center gap-xs transition-all duration-200 bg-secondary-container text-on-secondary-container font-bold" id="got-tab" onclick="switchType('got')">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_downward</span>
<span class="text-label-lg font-label-lg">Got (Cash In)</span>
</button>
<button class="flex-1 py-md rounded-lg flex items-center justify-center gap-xs transition-all duration-200 text-on-surface-variant hover:bg-surface-container-low" id="gave-tab" onclick="switchType('gave')">
<span class="material-symbols-outlined">arrow_upward</span>
<span class="text-label-lg font-label-lg">Gave (Cash Out)</span>
</button>
</div>
<!-- Amount Input Section -->
<section class="tonal-layer-1 p-xl rounded-xl flex flex-col items-center gap-sm relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-secondary-container" id="type-indicator"></div>
<label class="text-label-md font-label-md text-on-surface-variant uppercase tracking-widest">Transaction Amount</label>
<div class="flex items-baseline gap-xs">
<span class="text-headline-lg font-headline-lg text-primary">₹</span>
<input autofocus="" class="bg-transparent border-none text-[48px] font-bold text-on-surface text-center focus:ring-0 w-full max-w-[280px]" placeholder="0.00" type="number"/>
</div>
</section>
<!-- Form Details -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Date & Time -->
<div class="flex flex-col gap-xs">
<label class="text-label-lg font-label-lg text-on-surface-variant ml-xs">Date &amp; Time</label>
<div class="tonal-layer-1 flex items-center px-md py-sm rounded-xl gap-sm">
<span class="material-symbols-outlined text-outline">calendar_today</span>
<input class="bg-transparent border-none text-body-lg font-body-lg text-on-surface w-full focus:ring-0" type="datetime-local" value="2023-11-20T14:30"/>
</div>
</div>
<!-- Category / Payment Type -->
<div class="flex flex-col gap-xs">
<label class="text-label-lg font-label-lg text-on-surface-variant ml-xs">Payment Method</label>
<div class="tonal-layer-1 flex items-center px-md py-sm rounded-xl gap-sm">
<span class="material-symbols-outlined text-outline">payments</span>
<select class="bg-transparent border-none text-body-lg font-body-lg text-on-surface w-full focus:ring-0 appearance-none">
<option class="bg-surface" value="cash">Cash</option>
<option class="bg-surface" selected="" value="upi">UPI / Digital</option>
<option class="bg-surface" value="bank">Bank Transfer</option>
<option class="bg-surface" value="check">Cheque</option>
</select>
</div>
</div>
</div>
<!-- Note / Description -->
<div class="flex flex-col gap-xs">
<label class="text-label-lg font-label-lg text-on-surface-variant ml-xs">Note / Reference</label>
<div class="tonal-layer-1 p-md rounded-xl">
<textarea class="bg-transparent border-none text-body-lg font-body-lg text-on-surface w-full focus:ring-0 resize-none" placeholder="e.g. Invoice #892, Monthly rent..." rows="3"></textarea>
</div>
</div>
<!-- Attachment Section -->
<div class="flex flex-col gap-xs">
<label class="text-label-lg font-label-lg text-on-surface-variant ml-xs">Attachments</label>
<div class="flex flex-wrap gap-md">
<button class="tonal-layer-1 border-dashed border-outline-variant flex flex-col items-center justify-center w-32 h-32 rounded-xl hover:border-primary transition-colors group">
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors mb-xs">add_a_photo</span>
<span class="text-label-md font-label-md text-outline group-hover:text-on-surface">Add Bill</span>
</button>
<div class="relative w-32 h-32 rounded-xl overflow-hidden tonal-layer-1 group">
<img class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity" data-alt="A close-up photograph of a professional business receipt resting on a dark, charcoal-colored office desk. The lighting is moody and focused, with indigo highlights reflecting off the paper's edge. The setting is clean and high-end, representing a sophisticated financial management environment. The image uses deep shadows and sharp focus to emphasize precision and business clarity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6QZ0hPIoVv9RinC0DETPVF_pbR9Wdvob8_TG1U251ygK3xcMymoiajz9-j0b2jbGykJRJUmcMozvcBNGfyWs8iB1WZ-ZM1c0vw76M2cdgMBNeyXzhdSXxnfydTuVZi8DGsMyHk7gBVNk01uBZJKD9WBczB-bUc1hTJsW-WgtigHITCJqTBPMvuc7o6aeRTWy4P9boG-02RLxgFWPbTgY-pF-DrlH-rgNYUHbmzmDn8LqJwJvPLV-UV-mqVLN9esS0SYE4TfIzwzs4"/>
<button class="absolute top-1 right-1 bg-surface-container-highest/80 p-xs rounded-full">
<span class="material-symbols-outlined text-[16px] text-error">close</span>
</button>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex gap-md mt-lg mb-xxl">
<button class="flex-1 h-14 rounded-xl border border-outline-variant text-on-surface font-label-lg hover:bg-surface-container-low transition-colors duration-200">
                Cancel
            </button>
<button class="flex-[2] h-14 rounded-xl bg-[#6366f1] text-white font-label-lg font-bold primary-glow transition-all duration-200 flex items-center justify-center gap-xs active:scale-95">
<span class="material-symbols-outlined">check_circle</span>
                Save Transaction
            </button>
</div>
</main>
<!-- Navigation Shell (Bottom) - Displayed only on mobile -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-xs py-sm bg-surface border-t border-outline-variant shadow-lg">
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-all duration-200 p-xs rounded-lg">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-label-md font-label-md">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-all duration-200 p-xs rounded-lg">
<span class="material-symbols-outlined">group</span>
<span class="text-label-md font-label-md">Customers</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-all duration-200 p-xs rounded-lg">
<span class="material-symbols-outlined">inventory</span>
<span class="text-label-md font-label-md">Suppliers</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-all duration-200 p-xs rounded-lg">
<span class="material-symbols-outlined">analytics</span>
<span class="text-label-md font-label-md">Reports</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-highest transition-all duration-200 p-xs rounded-lg">
<span class="material-symbols-outlined">settings</span>
<span class="text-label-md font-label-md">Settings</span>
</div>
</nav>
<script>
        function switchType(type) {
            const gotBtn = document.getElementById('got-tab');
            const gaveBtn = document.getElementById('gave-tab');
            const indicator = document.getElementById('type-indicator');
            const amountSymbol = document.querySelector('.text-headline-lg.text-primary');

            if (type === 'got') {
                gotBtn.className = "flex-1 py-md rounded-lg flex items-center justify-center gap-xs transition-all duration-200 bg-secondary-container text-on-secondary-container font-bold";
                gaveBtn.className = "flex-1 py-md rounded-lg flex items-center justify-center gap-xs transition-all duration-200 text-on-surface-variant hover:bg-surface-container-low";
                indicator.className = "absolute top-0 left-0 w-full h-1 bg-secondary-container";
                amountSymbol.className = "text-headline-lg font-headline-lg text-secondary";
                
                // Material symbols toggle
                gotBtn.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
                gaveBtn.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
            } else {
                gaveBtn.className = "flex-1 py-md rounded-lg flex items-center justify-center gap-xs transition-all duration-200 bg-tertiary-container text-on-tertiary font-bold";
                gotBtn.className = "flex-1 py-md rounded-lg flex items-center justify-center gap-xs transition-all duration-200 text-on-surface-variant hover:bg-surface-container-low";
                indicator.className = "absolute top-0 left-0 w-full h-1 bg-tertiary-container";
                amountSymbol.className = "text-headline-lg font-headline-lg text-tertiary";

                // Material symbols toggle
                gaveBtn.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
                gotBtn.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
            }
        }
    </script>
</body></html>
